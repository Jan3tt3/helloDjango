{% include "ecommerce/messages.html" %}
{% include "ecommerce/search-view.html" %}

<h1>Vista de listado</h1>

<ul>
    {% for product in products %}
        <li>
            <a href="{% url 'detail' product.id %}">
                {{ product.title }}
            </a>
            - ${{ product.price }}
            - {{ product.color }}
        </li>
    {% empty %}
        <li>No hay productos disponibles.</li>
    {% endfor %}
</ul>
